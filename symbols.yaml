# Rime's punctuation and symbols
# encoding: utf-8
#
# Usage: patch your Rime schema to enable /X symbols

config_version: '1.3'

patch:
  # punctuator/import_preset: symbols
  # recognizer/patterns/punct: '^/([0-9]0?|[A-Za-z]+)$'
punctuator:
  full_shape:
    ' ' : { commit: 'гҖҖ' }
    ',' : { commit: пјҢ }
    '.' : { commit: гҖӮ }
    '<' : [ гҖҠ, гҖҲ, В«, вҖ№ ]
    '>' : [ гҖӢ, гҖү, В», вҖә ]
    '/' : [ пјҸ, Г· ]
    '?' : { commit: пјҹ }
    ';' : { commit: пјӣ }
    ':' : { commit: пјҡ }
    '''' : { pair: [ 'вҖҳ', 'вҖҷ' ] }
    '"' : { pair: [ 'вҖң', 'вҖқ' ] }
    '\' : гҖҒ #[ гҖҒ, пјј ]
    '|' : [ пҪң, В·, 'В§', 'ВҰ' ]
    '`' : пҪҖ
    '~' : пҪһ
    '!' : { commit: пјҒ }
    '@' : пј  #[ пј , вҳҜ ]
    '#' : пјғ #[ пјғ, вҢҳ ]
    '%' : [ пј…, 'В°', 'в„ғ' ]
    '$' : [ пҝҘ, '$', 'вӮ¬', 'ВЈ', 'ВҘ', 'Вў', 'ВӨ', вӮ© ]
    '^' : { commit: вҖҰвҖҰ }
    '&' : пјҶ
    '*' : пјҠ #[ пјҠ, В·, гғ», Г—, вҖ», вқӮ ]
    '(' : пјҲ
    ')' : пјү
    '-' : пјҚ
    '_' : вҖ”вҖ”
    '+' : пјӢ
    '=' : [ пјқ, гҖ…, гҖғ ]
    '[' : [ гҖҗ, гҖ”, гҖҢ, пј» ] #, гҖҡ, гҖҳ
    ']' : [ гҖ‘, гҖ•, гҖҚ, пјҪ] #, гҖӣ, гҖҷ
    '{' : [ "{", гҖ–, гҖҺ , пҪӣ ]
    '}' : [ "}", гҖ—, гҖҸ , пҪқ ]
  half_shape:
    ',' : { commit: пјҢ }
    '.' : { commit: гҖӮ }
    '<' : { commit: '<' } #[ гҖҠ, гҖҲ, В«, вҖ№, ЛӮ, Лұ ]
    '>' : { commit: '>' } #[ гҖӢ, гҖү, В», вҖә, Лғ, ЛІ ]
    '/' : { commit: '/' } #[ гҖҒ, пҪӨ, '/', пјҸ, Г· ]
    '?' : { commit: пјҹ }
    ';' : { commit: пјӣ }
    ':' : { commit: пјҡ }
    "'" : { commit: "'" } #[ 'вҖҳ', 'вҖҷ' ] #{ pair: [ 'вҖҳ', 'вҖҷ' ] }
    '"' : { pair: [ 'вҖң', 'вҖқ' ] }
    '\' : { commit: гҖҒ } #[ гҖҒ, '\', пјј ]
    '|' : { commit: '|' } #[ '|', В·, 'В·' , пҪң, 'В§', 'ВҰ', 'вҖ–', пёҙ ]
    '`' : { commit: '`' } #[ '`', В·, вҖө, вҖ¶, вҖ·, вҖІ, вҖі, вҖҙ, вҒ— ]
    '~' : { commit: '~' } #[ '~', пҪһ, Лң, Л·, вёҜ, вүҲ, вүӢ, вүғ, вү…, вүҮ, вҲҪ, вӢҚ, вүҢ, п№Ҹ, п№Ӣ, п№Ң, пёҙ ]
    '!' : { commit: пјҒ }
    '@' : '@' #[ '@', В©, В®, в„— ]
    '#' : '#' #[ '#', в„– ]
    '%' : { commit: '%' } #[ '%', пј…, 'В°', 'в„ғ', вҖ°, вҖұ, в„ү, в„…, в„Ҷ, в„Җ, в„Ғ, в…Қ ]
    '$' : { commit: пҝҘ } #[ , '$', 'вӮ¬', 'ВЈ', 'ВҘ', 'Вў', 'ВӨ', вӮ© ]
    '^' : { commit: вҖҰвҖҰ }
    '&' : '&'
    '*' : '*' #[ '*', пјҠ, В·, вҖ§, гғ», пҪҘ, Г—, вҖ», вқӮ, вҒӮ, вҳ®, вҳҜ, вҳЈ ]
    '(' : пјҲ
    ')' : пјү
    '-' : '-'
    '_' : вҖ”вҖ”
    '+' : '+'
    '=' : { commit: '=' } #[ '=', гҖ…, гҖғ ]
    '[' : { commit: '[' } #гҖҗ [ гҖҗ, гҖ”, гҖҢ, пј» ] #, гҖҡ, гҖҳ
    ']' : { commit: ']' } #гҖ‘ #[ гҖ‘, гҖ•, гҖҚ, пјҪ] #, гҖӣ, гҖҷ
    '{' : { commit: "{" } #[ "{", гҖ–, гҖҺ , пҪӣ ]
    '}' : { commit: "}" } #[ "}", гҖ—, гҖҸ , пҪқ ]
