# Rime's punctuation and symbols
# encoding: utf-8

config_version: '1.4'

punctuator:
  full_shape:
    ' ' : { commit: '　' }
    ',' : { commit: ， }
    '.' : { commit: 。 }
    '<' : [ 《, 〈, «, ‹ ]
    '>' : [ 》, 〉, », › ]
    '/' : [ ／, ÷ ]
    '?' : { commit: ？ }
    ';' : { commit: ； }
    ':' : { commit: ： }
    '''' : { pair: [ '‘', '’' ] }
    '"' : { pair: [ '“', '”' ] }
    '\' : 、
    '|' : [ ｜, ·, '§', '¦' ]
    '`' : ｀
    '~' : ～
    '!' : { commit: ！ }
    '@' : ＠
    '#' : ＃
    '%' : [ ％, '°', '℃' ]
    '$' : [ ￥, '$', '€', '£', '¥', '¢', '¤', ₩ ]
    '^' : { commit: …… }
    '&' : ＆
    '*' : ＊
    '(' : （
    ')' : ）
    '-' : －
    '_' : ——
    '+' : ＋
    '=' : [ ＝, 々, 〃 ]
    '[' : [ 【, 〔, 「, ［ , 〚, 〘 ]
    ']' : [ 】, 〕, 」, ］, 〛, 〙]
    '{' : [ "{", 〖, 『 , ｛ ]
    '}' : [ "}", 〗, 』 , ｝ ]
  half_shape:
    ',' : { commit: ， }
    '.' : { commit: 。 }
    '<' : { commit: '《' }
    '>' : { commit: '》' }
    '/' : { commit: '/' }
    '?' : { commit: ？ }
    ';' : { commit: ； }
    ':' : { commit: ： }
    "'" : { commit: "'" } # { pair: [ '‘', '’' ] }
    '"' : { pair: [ '“', '”' ] }
    '\' : { commit: 、 }
    '|' : { commit: '|' }
    '`' : { commit: '`' }
    '~' : { commit: '~' }
    '!' : { commit: ！ }
    '@' : '@'
    '#' : '#'
    '%' : { commit: '%' }
    '$' : { commit: ￥ }
    '^' : { commit: …… }
    '&' : '&'
    '*' : '*'
    '(' : （
    ')' : ）
    '-' : '-'
    '_' : ——
    '+' : '+'
    '=' : { commit: '=' }
    '[' : { commit: '[' }
    ']' : { commit: ']' }
    '{' : { commit: "{" }
    '}' : { commit: "}" }
