patch:
  schema/dependencies:
    - PY_c
    - tigers_simp_charset

  translator/dictionary: tiger.extended
  translator/enable_completion: true

  engine/filters:
    - simplifier@only_simplified
    - lua_filter@tigers_simp_filter
    - uniquifier

  only_simplified/opencc_config: t2s.json

  speller/auto_select_pattern: ^;\w+|^\w{4}$
  speller/alphabet: "zyxwvutsrqponmlkjihgfedcba"

  menu/page_size: 9
  style/horizontal: true
  style/vertical_auto_reverse: false
  style/layout/candidate_spacing: 17
  style/layout/hilite_spacing: 8
  style/layout/min_width: 85
  style/layout/max_width: 1200
  style/font_face: "Consolas, Microsoft YaHei UI"