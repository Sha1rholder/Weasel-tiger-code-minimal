# Rime schema
# encoding: utf-8

schema:
  schema_id: PY_c
  name: 拼音++
  version: "0.18"

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
    - table_translator
    - reverse_lookup_translator
  filters:
    - simplifier@simplification
    - simplifier@pinyin
    - simplifier@emoji_cn
    - uniquifier

speller:
  alphabet: "['zyxwvutsrqponmlkjihgfedcba]"
  delimiter: " '"
  algebra:
    - abbrev/^([a-z]).+$/$1/
    - abbrev/^([zcs]h).+$/$1/

translator:
  dictionary: PY_c
  prism: PY_c
  initial_quality: 1
  enable_user_dict: true
  enable_encoder: true
  strict_spelling: false
  enable_sentence: false
  enable_completion: false
  encode_commit_history: true
  max_phrase_length: 99
  user_dict: PY_c
  db_class: tabledb
  comment_format:
    - "xform/~/ /"
  preedit_format:
    - xform/([nl])v/$1ü/
    - xform/([nl])ue/$1üe/
    - xform/([jqxy])v/$1u/